<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Backchod Splotch - Multi Level Modular</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #2f9ca3;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #2f9ca3;
    }
  </style>
</head>
<body>
<canvas id="game" width="1365" height="690"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = 1365, H = 690;
const keys = { left:false, right:false, jump:false, restart:false };

window.addEventListener('keydown', (e) => {
  const c = e.code || e.key;
  if (c === 'ArrowLeft' || c === 'KeyA') keys.left = true;
  if (c === 'ArrowRight' || c === 'KeyD') keys.right = true;
  if (c === 'ArrowUp' || c === 'Space') keys.jump = true;
  if (c === 'KeyR') keys.restart = true;
  if (['ArrowLeft','ArrowRight','ArrowUp','Space','KeyA','KeyD','KeyR'].includes(c)) e.preventDefault();
}, { passive:false });

window.addEventListener('keyup', (e) => {
  const c = e.code || e.key;
  if (c === 'ArrowLeft' || c === 'KeyA') keys.left = false;
  if (c === 'ArrowRight' || c === 'KeyD') keys.right = false;
  if (c === 'ArrowUp' || c === 'Space') keys.jump = false;
  if (c === 'KeyR') keys.restart = false;
}, { passive:false });

const room = { x:(W - 1140) / 2, y:92, w:1140, h:245 };
const floorBottomY = room.y + room.h;
const floorH = 10;
const floorTopY = floorBottomY - floorH;
const holeDepth = 230;

const playerImg = new Image();
playerImg.src = 'assets/images/player.png';
const flagImg = new Image();
flagImg.src = 'assets/images/flag.png';
const spikeImg = new Image();
spikeImg.src = 'assets/images/spike.png';

const player = {
  w:18, h:24, x:0, y:0, vx:0, vy:0, flip:false,
  jumpLock:false, dead:false, deathTimer:0, onSurface:null
};

let levelIndex = 0;
let levelTimer = 0;
let levelComplete = false;
let levels = [];

function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}
function feetY(){ return player.y + player.h; }
function centerX(){ return player.x + player.w / 2; }

function drawRepeatedSpikes(x, y, w, h, upsideDown=false) {
  const count = Math.max(1, Math.floor(w / 28));
  for (let i = 0; i < count; i++) {
    const dx = x + i * (w / count);
    if (spikeImg.complete) {
      ctx.save();
      if (upsideDown) {
        ctx.translate(dx + (w / count) / 2, y + h);
        ctx.scale(1, -1);
        ctx.drawImage(spikeImg, -(w / count)/2, 0, w / count, h);
      } else {
        ctx.drawImage(spikeImg, dx, y, w / count, h);
      }
      ctx.restore();
    } else {
      ctx.fillStyle = '#111';
      ctx.fillRect(dx, y, w / count, h);
    }
  }
}

function drawPlayer() {
  if (playerImg.complete) {
    const drawX = player.x - 6;
    const drawY = player.y - 28;
    const dw = 30, dh = 52;
    ctx.save();
    if (player.flip) {
      ctx.translate(drawX + dw / 2, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(playerImg, 219, 80, 228, 397, -dw/2, drawY, dw, dh);
    } else {
      ctx.drawImage(playerImg, 219, 80, 228, 397, drawX, drawY, dw, dh);
    }
    ctx.restore();
  } else {
    ctx.fillStyle = '#7a31ff';
    ctx.fillRect(player.x, player.y - 28, 30, 52);
  }
}

function killPlayer() {
  if (player.dead || levelComplete) return;
  player.dead = true;
  player.deathTimer = 34;
  player.vx = 0;
  player.vy = 7;
}

function completeLevel() {
  if (levelComplete) return;
  levelComplete = true;
  levelTimer = 75;
}

function resetPlayer(spawnX) {
  player.x = spawnX - player.w / 2;
  player.y = floorTopY - player.h;
  player.vx = 0; player.vy = 0; player.flip = false;
  player.jumpLock = false; player.dead = false; player.deathTimer = 0;
  player.onSurface = null;
}

function makeGroundSpikeBand(x, w, bandStart, bandEnd) {
  return {
    type: 'groundSpikeBand',
    x, y: floorTopY - 26, w, h: 26,
    bandStart, bandEnd, active:false,
    reset(){ this.active = false; },
    update(){
      const cx = centerX();
      this.active = cx >= this.bandStart && cx <= this.bandEnd;
    },
    hitbox(){ return this.active ? {x:this.x, y:this.y, w:this.w, h:this.h} : null; },
    draw(){
      if (this.active) drawRepeatedSpikes(this.x, this.y, this.w, this.h, false);
    }
  };
}

function makeRoofSpikeBand(x, bandStart, bandEnd, maxH=120, w=42) {
  return {
    type: 'roofSpikeBand',
    x, y: room.y, w, h:0, maxH, bandStart, bandEnd, active:false,
    reset(){ this.h = 0; this.active = false; },
    update(){
      const cx = centerX();
      this.active = cx >= this.bandStart && cx <= this.bandEnd;
      if (this.active && this.h < this.maxH) this.h += 8;
      if (!this.active && this.h > 0) this.h -= 8;
      if (this.h < 0) this.h = 0;
    },
    hitbox(){ return this.h > 0 ? {x:this.x, y:this.y, w:this.w, h:this.h} : null; },
    draw(){
      if (this.h > 0) drawRepeatedSpikes(this.x, this.y, this.w, this.h, true);
    }
  };
}

function makeMovingFloorTrap(x, w, targetX, targetW, delayFrames=10) {
  return {
    type:'movingFloorTrap',
    x, y: floorTopY, w, h: floorH,
    homeX:x, homeW:w, targetX, targetW, delayFrames,
    state:'idle', timer:0, prevX:x,
    reset(){ this.x=this.homeX; this.w=this.homeW; this.state='idle'; this.timer=0; this.prevX=this.x; },
    surface(){ return this.w > 8 ? {x:this.x, y:this.y, w:this.w, h:this.h, ref:this} : null; },
    update(){
      this.prevX = this.x;
      if (this.state === 'armed') {
        this.timer--;
        if (this.timer <= 0) this.state = 'active';
      } else if (this.state === 'active') {
        if (this.w > this.targetW) {
          this.x += 2;
          this.w -= 4;
          if (this.w < this.targetW) this.w = this.targetW;
        }
        if (this.x < this.targetX) {
          this.x += 4;
          if (this.x > this.targetX) this.x = this.targetX;
        }
        if (this.w === this.targetW && this.x === this.targetX) this.state = 'done';
      }
    },
    draw(){ if (this.w > 8) { ctx.fillStyle='#4aa8b2'; ctx.fillRect(this.x, this.y, this.w, this.h); } },
    dynamicHoleRects(){ 
      const homeL = this.homeX, homeR = this.homeX + this.homeW;
      const curL = this.x, curR = this.x + this.w;
      const rects = [];
      if (curL > homeL) rects.push({x:homeL, y:floorTopY, w:curL-homeL, h:holeDepth});
      if (curR < homeR) rects.push({x:curR, y:floorTopY, w:homeR-curR, h:holeDepth});
      return rects.filter(r=>r.w>1);
    }
  };
}

function makeLevel1() {
  const holes = [
    { x: room.x + room.w * 0.18, w: 74 },
    { x: room.x + room.w * 0.47, w: 74 }
  ];
  const trap = makeMovingFloorTrap(room.x + room.w * 0.24, 170, room.x + room.w * 0.31, 84, 10);
  const hazards = [
    makeGroundSpikeBand(room.x + room.w * 0.63, 96, room.x + room.w * 0.58, room.x + room.w * 0.72),
    makeRoofSpikeBand(room.x + room.w * 0.43, room.x + room.w * 0.39, room.x + room.w * 0.51, 130, 48),
    trap
  ];
  return {
    name:'Level 1',
    spawnX: room.x + room.w * 0.06,
    flagX: room.x + room.w * 0.90,
    holes,
    hazards,
    buildBaseSegments() {
      const pieces = [];
      let cursor = room.x;
      const blockers = [
        {x: holes[0].x, w: holes[0].w},
        {x: trap.homeX, w: trap.homeW},
        {x: holes[1].x, w: holes[1].w}
      ].sort((a,b)=>a.x-b.x);
      for (const b of blockers) {
        if (b.x > cursor) pieces.push({x:cursor, y:floorTopY, w:b.x-cursor, h:floorH});
        cursor = Math.max(cursor, b.x + b.w);
      }
      if (cursor < room.x + room.w) pieces.push({x:cursor, y:floorTopY, w:(room.x+room.w)-cursor, h:floorH});
      return pieces;
    },
    extraHoleRects() { return trap.dynamicHoleRects(); },
    extraSurfaces() { const s = trap.surface(); return s ? [s] : []; }
  };
}

function makeJumpBlock(x, w=92, h=70) {
  return {
    type:'jumpBlock',
    x, y: floorTopY - h, w, h,
    surface(){ return {x:this.x, y:this.y, w:this.w, h:10, ref:this}; },
    draw(){ ctx.fillStyle='#4aa8b2'; ctx.fillRect(this.x, this.y, this.w, this.h); }
  };
}

function makeLevel2() {
  const blocks = [
    makeJumpBlock(room.x + 210),
    makeJumpBlock(room.x + 470),
    makeJumpBlock(room.x + 760)
  ];
  const movingBlock = makeMovingFloorTrap(blocks[1].x, blocks[1].w, blocks[1].x + 120, 52, 9);
  // replace middle block logic with moving block but still draw as pillar
  movingBlock.y = blocks[1].y;
  movingBlock.h = 10;
  movingBlock.draw = function() {
    if (this.w > 8) {
      ctx.fillStyle='#4aa8b2';
      ctx.fillRect(this.x, blocks[1].y, this.w, floorTopY - blocks[1].y + floorH);
    }
  };
  movingBlock.surface = function(){ return this.w > 8 ? {x:this.x, y:blocks[1].y, w:this.w, h:10, ref:this} : null; };

  const roofs = [
    makeRoofSpikeBand(blocks[0].x + 18, blocks[0].x - 30, blocks[0].x + 90),
    makeRoofSpikeBand(blocks[1].x + 18, blocks[1].x - 30, blocks[1].x + 90),
    makeRoofSpikeBand(blocks[2].x + 18, blocks[2].x - 30, blocks[2].x + 90)
  ];
  return {
    name:'Level 2',
    spawnX: room.x + 0.06 * room.w,
    flagX: room.x + room.w * 0.92,
    holes: [],
    hazards: [movingBlock, ...roofs],
    buildBaseSegments() {
      return [{x:room.x, y:floorTopY, w:room.w, h:floorH}];
    },
    extraHoleRects() { return movingBlock.dynamicHoleRects(); },
    extraSurfaces() {
      return [
        blocks[0].surface(),
        movingBlock.surface(),
        blocks[2].surface()
      ].filter(Boolean);
    },
    drawExtras() {
      blocks[0].draw();
      blocks[2].draw();
      movingBlock.draw();
    }
  };
}

function makeLevel3() {
  const slope = {
    baseX: room.x + room.w * 0.43,
    baseW: 190,
    height: 110,
    movedX: 0,
    moving:false,
    update(){
      if (this.moving && this.movedX < 140) this.movedX += 4;
    },
    startMove(){ this.moving = true; },
    currentBaseX(){ return this.baseX + this.movedX; },
    surfaceYAt(x) {
      const sx = this.currentBaseX();
      const ex = sx + this.baseW;
      if (x < sx || x > ex) return null;
      const t = (x - sx) / this.baseW;
      return floorTopY - this.height * (1 - Math.abs(2*t - 1));
    },
    draw(){
      ctx.fillStyle='#4aa8b2';
      const sx = this.currentBaseX();
      ctx.beginPath();
      ctx.moveTo(sx, floorTopY);
      ctx.lineTo(sx + this.baseW/2, floorTopY - this.height);
      ctx.lineTo(sx + this.baseW, floorTopY);
      ctx.closePath();
      ctx.fill();
    }
  };
  const topSpike = {
    x: room.x + room.w * 0.52,
    y: room.y,
    w: 44,
    h: 0,
    maxH: 125,
    activated:false,
    touchedMountain:false,
    reset(){ this.h = 0; this.activated = false; this.touchedMountain = false; },
    update(){
      if (!this.activated && centerX() >= room.x + room.w * 0.50) this.activated = true;
      if (this.activated && this.h < this.maxH) this.h += 8;
      const mountainTop = floorTopY - slope.height;
      if (!this.touchedMountain && this.h >= mountainTop - room.y) {
        this.touchedMountain = true;
        slope.startMove();
      }
    },
    hitbox(){ return this.h > 0 ? {x:this.x, y:this.y, w:this.w, h:this.h} : null; },
    draw(){ if (this.h > 0) drawRepeatedSpikes(this.x, this.y, this.w, this.h, true); }
  };
  return {
    name:'Level 3',
    spawnX: room.x + 0.06 * room.w,
    flagX: room.x + room.w * 0.92,
    holes: [],
    hazards: [topSpike],
    buildBaseSegments(){ return [{x:room.x, y:floorTopY, w:room.w, h:floorH}]; },
    extraHoleRects(){ 
      const sx = slope.currentBaseX();
      if (!slope.moving) return [];
      return [{x: sx - 10, y: floorTopY, w: slope.movedX + 10, h: holeDepth}];
    },
    extraSurfaces(){
      // approximate slope with small steps
      const surfs = [];
      for (let i=0;i<24;i++) {
        const x1 = slope.currentBaseX() + i*(slope.baseW/24);
        const x2 = slope.currentBaseX() + (i+1)*(slope.baseW/24);
        const mid = (x1+x2)/2;
        const y = slope.surfaceYAt(mid);
        surfs.push({x:x1, y:y, w:x2-x1, h:10});
      }
      return surfs;
    },
    drawExtras(){ slope.draw(); topSpike.draw(); },
    updateExtras(){ slope.update(); topSpike.update(); }
  };
}

function setupLevels() {
  levels = [makeLevel1(), makeLevel2(), makeLevel3()];
}

function currentLevel(){ return levels[levelIndex]; }

function resetCurrentLevel() {
  const lvl = currentLevel();
  lvl.hazards.forEach(h => h.reset && h.reset());
  if (lvl.updateExtras) {
    // rebuild level 3 custom state by recreating levels
    if (levelIndex === 2) levels[2] = makeLevel3();
  }
  resetPlayer(currentLevel().spawnX);
  levelComplete = false;
  levelTimer = 0;
}

function resetPlayer(spawnX) {
  player.x = spawnX - player.w/2;
  player.y = floorTopY - player.h;
  player.vx = 0; player.vy = 0; player.flip = false;
  player.jumpLock = false; player.dead = false; player.deathTimer = 0;
  player.onSurface = null;
}

function getBaseSegments() {
  return currentLevel().buildBaseSegments();
}

function getAllSurfaces() {
  const lvl = currentLevel();
  const s = getBaseSegments().map(v => ({...v, kind:'base'}));
  const extra = lvl.extraSurfaces ? lvl.extraSurfaces() : [];
  extra.forEach(v => s.push({...v, kind: v.ref ? v.ref.type || 'hazard' : 'extra'}));
  return s;
}

function onGround() {
  player.onSurface = null;
  for (const seg of getAllSurfaces()) {
    const horizontal = player.x + player.w > seg.x && player.x < seg.x + seg.w;
    const onTop = Math.abs(feetY() - seg.y) <= 2;
    if (horizontal && onTop) {
      player.onSurface = seg.ref || null;
      return true;
    }
  }
  return false;
}

function resolveCollision() {
  if (player.vy < 0) return false;
  const prevFeet = feetY() - player.vy;
  const currFeet = feetY();
  for (const s of getAllSurfaces()) {
    const horizontal = player.x + player.w > s.x && player.x < s.x + s.w;
    const crossed = prevFeet <= s.y && currFeet >= s.y;
    if (horizontal && crossed) {
      player.y = s.y - player.h;
      player.vy = 0;
      player.onSurface = s.ref || null;
      return true;
    }
  }
  player.onSurface = null;
  return false;
}

function inAnyHole() {
  const cx = centerX();
  const lvl = currentLevel();
  const permanent = (lvl.holes || []).some(h => cx >= h.x && cx <= h.x + h.w);
  const dynamic = (lvl.extraHoleRects ? lvl.extraHoleRects() : []).some(r => cx >= r.x && cx <= r.x + r.w);
  return permanent || dynamic;
}

function hitHazard() {
  for (const h of currentLevel().hazards) {
    if (h.hitbox) {
      const hb = h.hitbox();
      if (hb && rectsOverlap({x:player.x,y:player.y,w:player.w,h:player.h}, hb)) return true;
    }
  }
  return false;
}

function updateHazards() {
  for (const h of currentLevel().hazards) {
    if (player.onSurface === h && h.state === 'idle') {
      h.state = 'armed';
      h.timer = h.delayFrames || 8;
    }
    h.update && h.update();
  }
  currentLevel().updateExtras && currentLevel().updateExtras();
}

let levelComplete = false;

function killPlayer() {
  if (player.dead || levelComplete) return;
  player.dead = true;
  player.deathTimer = 34;
  player.vx = 0;
  player.vy = 7;
}

function completeLevel() {
  if (levelComplete) return;
  levelComplete = true;
  levelTimer = 72;
}

function updateGame() {
  const lvl = currentLevel();
  if (keys.restart) {
    resetCurrentLevel();
    keys.restart = false;
  }

  if (player.dead) {
    player.y += player.vy;
    player.deathTimer--;
    if (player.deathTimer <= 0) resetCurrentLevel();
    return;
  }

  if (levelComplete) {
    levelTimer--;
    if (levelTimer <= 0) {
      if (levelIndex < levels.length - 1) {
        levelIndex++;
        resetCurrentLevel();
      } else {
        levelComplete = false;
      }
    }
    return;
  }

  if (keys.left && !keys.right) { player.vx = -4.2; player.flip = true; }
  else if (keys.right && !keys.left) { player.vx = 4.2; player.flip = false; }
  else player.vx = 0;

  const grounded = onGround();
  if (keys.jump && !player.jumpLock && grounded) {
    player.vy = -13;
    player.jumpLock = true;
    player.onSurface = null;
  }
  if (!keys.jump) player.jumpLock = false;

  updateHazards();

  player.vy += 0.65;
  if (player.vy > 16) player.vy = 16;
  player.x += player.vx;
  player.y += player.vy;

  resolveCollision();

  const flagRect = {x:lvl.flagX-18,y:floorBottomY-94,w:36,h:94};
  if (rectsOverlap({x:player.x,y:player.y,w:player.w,h:player.h}, flagRect)) completeLevel();

  if (inAnyHole() && feetY() > floorTopY + 8) killPlayer();
  if (hitHazard()) killPlayer();
  if (player.y > H + 120) killPlayer();
}

function drawLevelBase() {
  const lvl = currentLevel();
  ctx.fillStyle = '#2f9ca3';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#e6dfbf';
  ctx.fillRect(room.x, room.y, room.w, room.h);

  ctx.fillStyle = '#ffffff';
  (lvl.holes || []).forEach(h => ctx.fillRect(h.x, floorTopY, h.w, holeDepth));
  (lvl.extraHoleRects ? lvl.extraHoleRects() : []).forEach(r => ctx.fillRect(r.x, r.y || floorTopY, r.w, r.h || holeDepth));

  ctx.fillStyle = '#4aa8b2';
  getBaseSegments().forEach(s => ctx.fillRect(s.x, s.y, s.w, s.h));
  lvl.drawExtras && lvl.drawExtras();

  if (flagImg.complete) {
    ctx.drawImage(flagImg, lvl.flagX - 18, floorBottomY - 94, 36, 94);
  }
}

function drawHUD() {
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fillRect(10, 10, 560, 36);
  ctx.fillStyle = '#ffffff';
  ctx.font = '18px Arial';
  ctx.fillText(`${currentLevel().name}  |  A/D or ←/→ move, Space/↑ jump, R restart`, 18, 34);

  if (player.dead) {
    ctx.font = '28px Arial';
    ctx.fillStyle = '#ff2f97';
    ctx.textAlign = 'center';
    ctx.fillText('Tu toh gaya bete.', W / 2, 36);
    ctx.textAlign = 'left';
  }
  if (levelComplete) {
    ctx.font = '32px Arial';
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    const msg = levelIndex < levels.length - 1 ? 'Level Complete! Next level...' : 'Congratulations! All current levels done.';
    ctx.fillText(msg, W / 2, 70);
    ctx.textAlign = 'left';
  }
}

function draw() {
  ctx.clearRect(0,0,W,H);
  drawLevelBase();
  currentLevel().hazards.forEach(h => h.draw && h.draw());
  drawPlayer();
  drawHUD();
}

function loop() {
  updateGame();
  draw();
  requestAnimationFrame(loop);
}

setupLevels();
resetCurrentLevel();
loop();
</script>
</body>
</html>
